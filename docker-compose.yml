services:
  roomies:
    container_name: roomies
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5123:5123"
    volumes:
      - ./media:/media:ro
      - ./cache:/cache
      - ./config:/config
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # --------------------------------------------------------
    # Hardware Acceleration (GPU) Configurations
    # --------------------------------------------------------
    # Option A: Intel / AMD (VAAPI / QSV)
    # Uncomment the `devices` block below if your host uses an Intel/AMD GPU
    # devices:
    #   - /dev/dri:/dev/dri
    #
    # Option B: NVIDIA (NVENC)
    # Uncomment the `deploy` block below if your host uses an NVIDIA GPU
    # and has the nvidia-container-toolkit installed.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu, video, compute, utility]
