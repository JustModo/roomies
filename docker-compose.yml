services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5123:5123"
    volumes:
      - ./media:/media:ro
      - ./cache:/cache
      - ./config:/config
    # Optional: hardware-accelerated transcoding (VAAPI). Only uncomment on a
    # host with an Intel/AMD GPU exposing /dev/dri — without this, hwaccel
    # detection safely reports "cpu" and transcoding behaves exactly as
    # before. Toggle HWACCEL_MODE (auto/cpu) from the Admin Overlay's
    # SETTINGS tab; "auto" only takes effect once this device is passed in.
    # devices:
    #   - /dev/dri:/dev/dri

