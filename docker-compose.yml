services:
  # ─────────────────────────────────────────────
  # Application
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/roomies.db
      CACHE_DIR: /srv/cache
      HLS_BASE_URL: http://localhost/hls
      FFMPEG_PATH: ffmpeg
      MEDIA_ROOT: /srv/media
      CORS_ORIGIN: http://localhost
    volumes:
      - ${MEDIA_DIR:-./media}:/srv/media:ro # read-only: source media files
      - ./cache:/srv/cache # read-write: HLS output
      - ./data:/app/data # read-write: SQLite database file
    # No host port published: all traffic must route through Caddy (80/443),
    # which is the only public entrypoint. Use `docker compose exec api sh`
    # or `docker compose logs -f api` for local debugging instead.

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # Reverse Proxy (single entrypoint)
  # ─────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./cache:/srv/cache:ro # read-only: Caddy serves HLS from here
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  caddy_data:
  caddy_config:
